# DAgger distillation — Task 1, tanh-squashed actions + saturation penalty.
# Aims to fix the bang-bang policy that fails MuJoCo sim-to-sim transfer.
# Teacher: DRND checkpoint at 9.9M steps.
#
# Usage:
#   python distill.py --config configs/distill_local_tanh.yaml

task: distant_target
seed: 42

teacher_checkpoint: checkpoints/distant_target__drnd__seed42/step_9900288.pt

# ── Environment ───────────────────────────────────────────────────────────────
env:
  num_envs: 32
  episode_length: 1000
  device: cuda
  headless: true
  physics_dt: 0.005
  control_dt: 0.02
  randomise:
    position_range: 0.30
    mass_range: 0.30
    friction_range: 0.50
    num_distractors: [1, 3]

# ── DAgger ────────────────────────────────────────────────────────────────────
dagger:
  num_iterations: 20
  collect_steps: 1000
  train_epochs: 10
  batch_size: 512
  lr: 3.0e-4
  beta_start: 1.0
  beta_min: 0.1
  beta_decay: 0.85
  hidden_dim: 256

  # ── Smoothing (this experiment) ──────────────────────────────────────────────
  tanh_squash: true          # action = tanh(logits) ∈ (-1, 1)
  saturation_penalty: 0.01   # λ on mean(logits²); raise if still bang-bang
  imitate_clamped: true      # match clamp(teacher_mean, -1, 1), not raw ±1700
