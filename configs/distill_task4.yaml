# DAgger distillation config — Task 4 (WeightLeverEnv), RTX 3050 local
# Teacher: DRND checkpoint at 9.9M steps

task: weight_lever
seed: 42

teacher_checkpoint: checkpoints/weight_lever__drnd__seed42/step_9900288.pt

# ── Environment ───────────────────────────────────────────────────────────────
env:
  num_envs: 32
  episode_length: 1000
  device: cuda
  headless: true
  physics_dt: 0.005
  control_dt: 0.02
  randomise:
    position_range: 0.30
    mass_range: 0.30
    friction_range: 0.50

# ── DAgger ────────────────────────────────────────────────────────────────────
dagger:
  num_iterations: 20
  collect_steps: 1000
  train_epochs: 10
  batch_size: 512
  lr: 3.0e-4
  beta_start: 1.0
  beta_min: 0.1
  beta_decay: 0.85
  hidden_dim: 256
