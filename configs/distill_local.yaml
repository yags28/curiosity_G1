# DAgger distillation config — RTX 3050 local
# Teacher: DRND checkpoint at 9.9M steps (100% success on Task 1)
#
# Usage:
#   python distill.py --config configs/distill_local.yaml
#   python distill.py --config configs/distill_local.yaml --viewer

task: distant_target
seed: 42

teacher_checkpoint: checkpoints/distant_target__drnd__seed42/step_9900288.pt

# ── Environment ───────────────────────────────────────────────────────────────
env:
  num_envs: 32
  episode_length: 1000
  device: cuda
  headless: true
  physics_dt: 0.005
  control_dt: 0.02
  randomise:
    position_range: 0.30
    mass_range: 0.30
    friction_range: 0.50
    num_distractors: [1, 3]

# ── DAgger ────────────────────────────────────────────────────────────────────
dagger:
  num_iterations: 20        # 20 rounds of collect→train
  collect_steps: 1000       # steps per collection (× num_envs = 32K samples/iter)
  train_epochs: 10          # gradient epochs over aggregated dataset each iter
  batch_size: 512
  lr: 3.0e-4
  beta_start: 1.0           # iter 0: teacher rolls out; iter 1+: student rolls out
  beta_min: 0.1
  beta_decay: 0.85          # β × 0.85 each iteration
  hidden_dim: 256
