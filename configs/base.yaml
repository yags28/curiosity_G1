# Base configuration for CDL-HumanoidToolUse experiments.
# CLI overrides: python launch.py --config configs/base.yaml --task elevated_button --curiosity drnd --seed 1
#
# wandb team setup (one-time):
#   1. One of you goes to wandb.ai → Create team (e.g. "purdue-cdl")
#   2. Invite bhagat14 to the team
#   3. Update entity below to the team slug (e.g. "purdue-cdl")
#   Current accounts: ydawanka, bhagat14

wandb:
  project: CDL-HumanoidToolUse
  entity: ydawanka-purdue-university

seed: 42
task: distant_target        # distant_target | elevated_button | occluded_retrieval | weight_lever | composite

# ── Environment ───────────────────────────────────────────────────────────────
env:
  num_envs: 4096            # parallel Isaac Lab environments (target: ≥4096 on cluster)
  episode_length: 2000      # max steps per episode; composite task uses 3000
  device: cuda
  headless: true
  physics_dt: 0.005         # 200 Hz physics
  control_dt: 0.02          # 50 Hz policy
  # Object randomisation (Section 3.4)
  randomise:
    position_range: 0.30    # ±30% of nominal XY
    mass_range: 0.30        # ±30% of nominal mass
    friction_range: 0.50    # ±50% of nominal friction
    num_distractors: [1, 3] # uniform sample from [1, 3]

# ── Curiosity module ──────────────────────────────────────────────────────────
curiosity:
  method: rnd               # rnd | drnd | rdd | icm | qflex

  rnd:
    output_dim: 512         # 512 for image obs; 64 for state-vector obs
    hidden_dim: 512
    lr: 1.0e-4
    normalize_rewards: true # running mean/var normalisation to prevent scale explosion

  drnd:
    n_ensemble: 10          # ensemble of N=10 random target networks
    output_dim: 512
    hidden_dim: 512
    lr: 1.0e-4
    normalize_rewards: true

  rdd:
    sigma: 1.0              # fixed noise std for distributional target
    output_dim: 512         # 512 (image) or 64 (state-vector)
    hidden_dim: 512
    lr: 1.0e-4
    normalize_rewards: true

  icm:
    feature_dim: 256
    forward_loss_weight: 0.2
    lr: 1.0e-4

  qflex:
    lr: 1.0e-4              # placeholder — update when QFLEX paper details are confirmed

# ── PPO ───────────────────────────────────────────────────────────────────────
ppo:
  num_steps: 24             # rollout steps per env per update
  num_minibatches: 4
  update_epochs: 5
  lr: 3.0e-4
  anneal_lr: true
  gamma_int: 0.999          # discount for intrinsic returns (separate critic)
  gamma_ext: 0.990          # discount for extrinsic returns
  gae_lambda: 0.95
  clip_coef: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 1.0
  # Asymmetric actor-critic: actor sees privileged state during training
  use_privileged_obs: true

# ── Reward annealing ──────────────────────────────────────────────────────────
reward:
  alpha_start: 1.0          # intrinsic reward weight at step 0
  alpha_end: 0.1            # intrinsic reward weight at end of annealing
  alpha_anneal_steps: 50_000_000
  extrinsic_weight: 1.0
  time_penalty: -0.001      # per-timestep penalty to encourage efficiency

# ── Training schedule ─────────────────────────────────────────────────────────
training:
  total_timesteps: 200_000_000
  checkpoint_interval: 1_000_000
  log_interval: 10          # log every N PPO updates
  checkpoint_dir: checkpoints/
  video_dir: videos/
  resume_checkpoint: null   # set to path to resume a run
