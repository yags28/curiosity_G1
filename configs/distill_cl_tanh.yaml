# DAgger distillation — Task 1, CLOSED-LOOP teacher (actor sees stick+target)
# + tanh-squashed actions + saturation penalty. For sim-to-sim transfer.
# Teacher: retrained DRND with closed-loop obs (115-dim) + restitution DR.
#
# Usage:
#   python distill.py --config configs/distill_cl_tanh.yaml

task: distant_target
seed: 42
run_name: dagger_cl__distant_target__seed42

# --no-wandb runs write to "<task>__<method>__local" (the --run-name flag only
# names the wandb run). Override with --teacher <latest ckpt> at distill time.
teacher_checkpoint: checkpoints/distant_target__drnd__local/step_9900288.pt

env:
  num_envs: 32
  episode_length: 1000
  device: cuda
  headless: true
  physics_dt: 0.005
  control_dt: 0.02
  randomise:
    position_range: 0.30
    mass_range: 0.30
    friction_range: 0.50
    num_distractors: [1, 3]

dagger:
  num_iterations: 20
  collect_steps: 1000
  train_epochs: 10
  batch_size: 512
  lr: 3.0e-4
  beta_start: 1.0
  beta_min: 0.1
  beta_decay: 0.85
  hidden_dim: 256
  tanh_squash: true
  saturation_penalty: 0.10
  imitate_clamped: true
