# Local training config — RTX 3050 OEM (8 GB VRAM), i7-12700K
# Usage: python launch.py --config configs/local.yaml --task distant_target --curiosity rnd
#
# Overrides base.yaml for single-GPU local runs.
# Swap back to base.yaml when cluster access is available.

wandb:
  project: CDL-HumanoidToolUse
  entity: ydawanka-purdue-university

seed: 42
task: distant_target

# ── Environment ───────────────────────────────────────────────────────────────
env:
  num_envs: 32               # 8 GB VRAM; bump to 64 if no OOM
  episode_length: 1000       # shorter episodes for faster iteration locally
  device: cuda
  headless: false
  physics_dt: 0.005
  control_dt: 0.02
  randomise:
    position_range: 0.30
    mass_range: 0.30
    friction_range: 0.50
    num_distractors: [1, 3]

# ── Curiosity module ──────────────────────────────────────────────────────────
curiosity:
  method: rnd

  rnd:
    output_dim: 64             # 64 for state-vector obs (not image)
    hidden_dim: 256
    lr: 1.0e-4
    normalize_rewards: true

  drnd:
    n_ensemble: 5              # halved from 10 to save memory
    output_dim: 64
    hidden_dim: 256
    lr: 1.0e-4
    normalize_rewards: true

  rdd:
    sigma: 1.0
    output_dim: 64
    hidden_dim: 256
    lr: 1.0e-4
    normalize_rewards: true

  icm:
    feature_dim: 128
    forward_loss_weight: 0.2
    lr: 1.0e-4

  qflex:
    lr: 1.0e-4

# ── PPO ───────────────────────────────────────────────────────────────────────
ppo:
  num_steps: 24              # batch = 32 envs × 24 steps = 768 per update
  num_minibatches: 4         # minibatch = 192
  update_epochs: 5
  lr: 3.0e-4
  anneal_lr: true
  gamma_int: 0.999
  gamma_ext: 0.990
  gae_lambda: 0.95
  clip_coef: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 1.0
  use_privileged_obs: true

# ── Reward annealing ──────────────────────────────────────────────────────────
reward:
  alpha_start: 1.0
  alpha_end: 0.1
  alpha_anneal_steps: 5_000_000   # scaled from 50M (cluster) → 5M (local)
  extrinsic_weight: 1.0
  time_penalty: -0.001

# ── Training schedule ─────────────────────────────────────────────────────────
training:
  total_timesteps: 10_000_000     # ~8.5 hours locally vs 200M on cluster
  checkpoint_interval: 100_000
  log_interval: 10
  checkpoint_dir: checkpoints/
  video_dir: videos/
  resume_checkpoint: null
